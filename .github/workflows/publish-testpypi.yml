name: publish-testpypi

# Manual rehearsal of the release publish against TestPyPI, so the real PyPI run
# (publish.yml, on release) is never the first time the flow executes. Trigger from
# the Actions tab → "publish-testpypi" → Run workflow.
#
# One-time setup (see docs/RELEASING.md):
#   - Add a trusted publisher on https://test.pypi.org for repo Lee-Dongwook/E2E-Self-Heal,
#     workflow `publish-testpypi.yml`, environment `testpypi`.
#   - Create a GitHub environment named `testpypi`.

on:
  workflow_dispatch:

jobs:
  testpypi:
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write # OIDC trusted publishing — no API token needed
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
