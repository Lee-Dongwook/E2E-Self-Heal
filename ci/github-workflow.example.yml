# Live self-demo — runs THIS repo's own examples/ project through the action.
# The example test targets a renamed selector, so the suite fails and the engine
# heals it, then a patch PR is opened. To activate, copy this into
# .github/workflows/ and set the NVIDIA_API_KEY secret.

name: e2e-self-heal-demo

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "examples/**"
      - "action.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  self-heal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install example Playwright project
        working-directory: examples
        run: |
          npm install
          npx playwright install --with-deps chromium

      # Runs examples/example.spec.ts (fails on the renamed selector) and heals it
      # using the shipped selector-rename.diff.
      - name: E2E self-heal
        id: heal
        uses: ./
        with:
          working-directory: examples
          test-path: example.spec.ts
          diff-file: selector-rename.diff
          nvidia-api-key: ${{ secrets.NVIDIA_API_KEY }}

      # If the core healed the test, open a PR with the patch for review.
      - name: Open patch PR
        if: steps.heal.outputs.outcome == 'healed'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "fix(e2e): auto-heal broken selector (self-demo)"
          title: "Auto-healed E2E test (self-demo)"
          body-path: ${{ steps.heal.outputs.summary-path }}
          branch: e2e-self-heal/${{ github.run_id }}
          add-paths: examples/example.spec.ts

      # If it failed and could not be healed, fail the job so humans look.
      - name: Fail if unhealed
        if: steps.heal.outputs.outcome == 'unhealed'
        run: |
          echo "E2E failed and could not be auto-healed"
          exit 1
